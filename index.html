<script type="module">
    import * as THREE from 'three';

    // --- 3D СФЕРА С СЕРВЕРАМИ (эффект 25) ---
    const canvas = document.getElementById('canvas-bg');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    
    const scene = new THREE.Scene();
    scene.background = null; // прозрачный фон
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);
    camera.lookAt(0, 0, 0);
    
    // Группа для вращения
    const globeGroup = new THREE.Group();
    scene.add(globeGroup);
    
    // Сфера-скелет (полупрозрачная)
    const geometry = new THREE.SphereGeometry(3, 64, 64);
    const material = new THREE.MeshBasicMaterial({ color: 0x39ff14, wireframe: true, transparent: true, opacity: 0.15 });
    const wireframeSphere = new THREE.Mesh(geometry, material);
    globeGroup.add(wireframeSphere);
    
    // Внутреннее свечение - точки (имитация серверов)
    const pointsGeometry = new THREE.BufferGeometry();
    const pointsCount = 180;
    const positions = new Float32Array(pointsCount * 3);
    for (let i = 0; i < pointsCount; i++) {
        // случайные точки на сфере
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 3.05;
        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta);
        const z = r * Math.cos(phi);
        positions[i*3] = x;
        positions[i*3+1] = y;
        positions[i*3+2] = z;
    }
    pointsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const pointsMaterial = new THREE.PointsMaterial({ color: 0x39ff14, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
    const serverPoints = new THREE.Points(pointsGeometry, pointsMaterial);
    globeGroup.add(serverPoints);
    
    // Добавим дополнительный ореол – частицы вокруг
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 800;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 200;
        starPositions[i*3+1] = (Math.random() - 0.5) * 100;
        starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0x88ff88, size: 0.05, transparent: true, opacity: 0.4 });
    const starsField = new THREE.Points(starGeometry, starMaterial);
    scene.add(starsField);
    
    // Маленькие вращающиеся кольца
    const ringGeo = new THREE.TorusGeometry(3.2, 0.03, 64, 300);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x226611 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    globeGroup.add(ring);
    
    const ring2Geo = new THREE.TorusGeometry(3.4, 0.02, 64, 300);
    const ring2Mat = new THREE.MeshStandardMaterial({ color: 0x88ff44, emissive: 0x116600 });
    const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
    ring2.rotation.z = Math.PI / 3;
    ring2.rotation.x = Math.PI / 3;
    globeGroup.add(ring2);
    
    // Свет
    const ambientLight = new THREE.AmbientLight(0x111111);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0x39ff14, 0.5, 20);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);
    const backLight = new THREE.PointLight(0x226622, 0.3);
    backLight.position.set(-3, -2, -4);
    scene.add(backLight);
    
    let time = 0;
    
    function animate3d() {
        requestAnimationFrame(animate3d);
        time += 0.005;
        globeGroup.rotation.y = time * 0.4;
        globeGroup.rotation.x = Math.sin(time * 0.2) * 0.2;
        ring.rotation.z += 0.008;
        ring2.rotation.x += 0.005;
        ring2.rotation.y += 0.007;
        starsField.rotation.y += 0.0005;
        starsField.rotation.x += 0.0003;
        
        camera.position.x = Math.sin(time * 0.1) * 0.5;
        camera.position.y = 2 + Math.sin(time * 0.3) * 0.2;
        camera.lookAt(0, 0, 0);
        
        renderer.render(scene, camera);
    }
    animate3d();
    
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>

                <button class="tab-btn active" data-os="android">📱 Android</button>
                <button class="tab-btn" data-os="ios">🍏 iOS</button>
                <button class="tab-btn" data-os="windows">💻 Windows</button>
                <button class="tab-btn" data-os="mac">🍎 macOS</button>
                <button class="tab-btn" data-os="linux">🐧 Linux</button>
            </div>
            <div id="tabContent"></div>
        `,
        support: `
            <h2 class="section-title">Поддержка и контакты</h2>
            <p class="section-sub">Мы всегда на связи в Telegram</p>
            <div class="support-buttons">
                <a href="https://t.me/dearkvpn_bot" target="_blank" class="btn-primary">🤖 Бот для оплаты</a>
                <a href="https://t.me/dearkvpn" target="_blank" class="btn-secondary">📢 Новостной канал</a>
                <a href="https://t.me/dearkvpn" target="_blank" class="btn-secondary">💬 Чат поддержки</a>
            </div>
            <div style="background: rgba(17,17,17,0.85); border-radius: 24px; padding: 32px; margin-top: 48px; text-align: center; border: 1px solid #222;">
                <h3 style="margin-bottom: 16px;">Не нашли ответ?</h3>
                <p style="color: #aaa; margin-bottom: 24px;">Напишите нам в Telegram — ответим в течение часа</p>
                <a href="https://t.me/dearkvpn" target="_blank" class="btn-primary">Написать в поддержку</a>
            </div>
        `
    };

    const guideData = {
        android: { app: "NekoRay / v2rayNG / Hiddify", steps: ["Скачайте приложение из Google Play или с официального сайта", "Откройте бота @dearkvpn_bot и оплатите подписку", "Бот пришлёт конфиг — скачайте файл", "В приложении нажмите «Импорт» и выберите полученный файл", "Включите VPN"], command: "конфиг-файл.conf" },
        ios: { app: "Shadowrocket / Streisand / V2Box", steps: ["Установите приложение из App Store", "Перейдите в бот @dearkvpn_bot, оплатите подписку", "Бот пришлёт ссылку — нажмите на неё", "Приложение откроется автоматически, сохраните конфиг", "Подключитесь"], command: "ссылка-на-конфиг" },
        windows: { app: "v2rayN / Nekoray / Hiddify", steps: ["Скачайте v2rayN с GitHub", "Распакуйте и запустите", "Получите конфиг у бота @dearkvpn_bot", "Перетащите файл в окно v2rayN", "Нажмите Enter → Подключиться"], command: "v2rayN.exe" },
        mac: { app: "V2RayX / Nekoray / Hiddify", steps: ["Установите Nekoray для macOS", "Откройте бота, оплатите, получите конфиг", "В Nekoray: Profile → Import → Выберите файл", "Нажмите Connect"], command: "nekoray.dmg" },
        linux: { app: "Nekoray / v2rayA / Qv2ray", steps: ["Установите Nekoray (apt / pacman / сборка)", "Запустите, получите конфиг у бота", "Импортируйте файл (Перетащите в окно)", "Включите туннель"], command: "nekoray.AppImage" }
    };

    let currentPage = "home";
    function attachCopyEvents() {
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const text = btn.getAttribute('data-copy');
                navigator.clipboard.writeText(text);
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
            });
        });
    }

    function renderGuide(os) {
        const data = guideData[os];
        const content = `<div style="margin-bottom:24px"><h3 style="color: var(--accent);">📱 Приложение: ${data.app}</h3></div>
            <div style="background:#1a1a1a; border-radius:20px; padding:20px">
            <h4 style="margin-bottom:16px">Пошаговая инструкция:</h4>
            <ol style="margin-left:20px;color:#ccc;line-height:1.8">${data.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
            <div class="code-block"><span>📁 ${data.command}</span><button class="copy-btn" data-copy="${data.command}">Копировать</button></div>
            <p style="color:#aaa;margin-top:16px">💡 Не получается? Напишите в поддержку — поможем!</p></div>`;
        document.getElementById("tabContent").innerHTML = content;
        attachCopyEvents();
    }

    function loadPage(page) {
        currentPage = page;
        document.getElementById('pageContainer').innerHTML = pages[page];
        if (page === 'guide') {
            renderGuide('android');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGuide(btn.getAttribute('data-os'));
                });
            });
        }
        if (page === 'home') {
            const btn = document.getElementById('toTariffsBtn');
            if (btn) btn.addEventListener('click', () => changePage('tariffs'));
        }
        document.querySelectorAll('.menu-item').forEach(item => {
            if (item.getAttribute('data-page') === page) item.classList.add('active');
            else item.classList.remove('active');
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changePage(page) {
        closeMenu();
        loadPage(page);
        history.pushState(null, '', `#${page}`);
    }

    function closeMenu() { document.getElementById('menu').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('open'); }
    function openMenu() { document.getElementById('menu').classList.add('open'); document.getElementById('menuOverlay').classList.add('open'); }

    document.getElementById('burgerBtn').addEventListener('click', openMenu);
    document.getElementById('menuOverlay').addEventListener('click', closeMenu);
    document.querySelectorAll('.menu-item').forEach(btn => btn.addEventListener('click', () => changePage(btn.getAttribute('data-page'))));

    const hash = window.location.hash.slice(1);
    loadPage(hash && pages[hash] ? hash : 'home');
    window.addEventListener('popstate', () => { const h = window.location.hash.slice(1); loadPage(h && pages[h] ? h : 'home'); });
</script>
</body>
  </html>
