<script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('canvas-bg');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    
    const scene = new THREE.Scene();
    scene.background = null;
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);
    
    const globeGroup = new THREE.Group();
    scene.add(globeGroup);
    
    const geometry = new THREE.SphereGeometry(3, 64, 64);
    const material = new THREE.MeshBasicMaterial({ color: 0x39ff14, wireframe: true, transparent: true, opacity: 0.15 });
    const wireframeSphere = new THREE.Mesh(geometry, material);
    globeGroup.add(wireframeSphere);
    
    const pointsGeometry = new THREE.BufferGeometry();
    const pointsCount = 180;
    const positions = new Float32Array(pointsCount * 3);
    for (let i = 0; i < pointsCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 3.05;
        positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i*3+2] = r * Math.cos(phi);
    }
    pointsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const pointsMaterial = new THREE.PointsMaterial({ color: 0x39ff14, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
    globeGroup.add(new THREE.Points(pointsGeometry, pointsMaterial));
    
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 800;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i*3] = (Math.random() - 0.5) * 200;
        starPositions[i*3+1] = (Math.random() - 0.5) * 100;
        starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    scene.add(new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0x88ff88, size: 0.05, transparent: true, opacity: 0.4 })));
    
    const ringGeo = new THREE.TorusGeometry(3.2, 0.03, 64, 300);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x226611 }));
    ring.rotation.x = Math.PI / 2;
    globeGroup.add(ring);
    
    const ring2Geo = new THREE.TorusGeometry(3.4, 0.02, 64, 300);
    const ring2 = new THREE.Mesh(ring2Geo, new THREE.MeshStandardMaterial({ color: 0x88ff44, emissive: 0x116600 }));
    ring2.rotation.z = Math.PI / 3;
    ring2.rotation.x = Math.PI / 3;
    globeGroup.add(ring2);
    
    scene.add(new THREE.AmbientLight(0x111111));
    const pointLight = new THREE.PointLight(0x39ff14, 0.5, 20);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);
    scene.add(new THREE.PointLight(0x226622, 0.3).setPosition(-3, -2, -4));
    
    let time = 0;
    function animate3d() {
        requestAnimationFrame(animate3d);
        time += 0.005;
        globeGroup.rotation.y = time * 0.4;
        globeGroup.rotation.x = Math.sin(time * 0.2) * 0.2;
        ring.rotation.z += 0.008;
        ring2.rotation.x += 0.005;
        ring2.rotation.y += 0.007;
        camera.position.x = Math.sin(time * 0.1) * 0.5;
        camera.position.y = 2 + Math.sin(time * 0.3) * 0.2;
        camera.lookAt(0, 0, 0);
        renderer.render(scene, camera);
    }
    animate3d();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

<script>
    // Canvas карта серверов
    function initServerMap() {
        const canvas = document.getElementById('serverCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.parentElement.clientWidth;
        const height = 400;
        canvas.width = width;
        canvas.height = height;
        
        // Координаты сервера (Франкфурт, Германия, ~50.1°N, 8.7°E)
        // Проекция: x = (lon + 180) * (width / 360), y = (90 - lat) * (height / 180)
        const servers = [
            { name: "🇩🇪 Frankfurt, DE", lat: 50.1109, lon: 8.6821, ping: 12, load: 23, online: true },
            { name: "🌍 Virtual Node (AMS)", lat: 52.3676, lon: 4.9041, ping: 18, load: 45, online: true, virtual: true },
            { name: "🌐 Coming Soon", lat: 40.7128, lon: -74.0060, ping: null, load: null, online: false }
        ];
        
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Фон карты
            ctx.fillStyle = '#0a120a';
            ctx.fillRect(0, 0, width, height);
            
            // Сетка широт/долгот
            ctx.strokeStyle = '#1a3a1a';
            ctx.lineWidth = 0.5;
            for (let lat = -90; lat <= 90; lat += 30) {
                const y = (90 - lat) * (height / 180);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            for (let lon = -180; lon <= 180; lon += 30) {
                const x = (lon + 180) * (width / 360);
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            
            // Континенты (упрощённые пятна)
            ctx.fillStyle = '#0f2a0f';
            ctx.beginPath();
            ctx.ellipse(width*0.5, height*0.45, width*0.35, height*0.25, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(width*0.25, height*0.6, width*0.2, height*0.15, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Линии соединений от сервера к другим точкам
            const mainX = (servers[0].lon + 180) * (width / 360);
            const mainY = (90 - servers[0].lat) * (height / 180);
            
            for (let i = 1; i < servers.length; i++) {
                if (!servers[i].online) continue;
                const x = (servers[i].lon + 180) * (width / 360);
                const y = (90 - servers[i].lat) * (height / 180);
                ctx.beginPath();
                ctx.moveTo(mainX, mainY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = `rgba(57, 255, 20, ${0.3 + Math.sin(Date.now() * 0.002 + i) * 0.1})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // Анимированные частицы на линиях
                const progress = (Date.now() * 0.002 + i) % 1;
                const particleX = mainX + (x - mainX) * progress;
                const particleY = mainY + (y - mainY) * progress;
                ctx.fillStyle = '#39ff14';
                ctx.beginPath();
                ctx.arc(particleX, particleY, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Рисуем сервера
            servers.forEach((s, idx) => {
                const x = (s.lon + 180) * (width / 360);
                const y = (90 - s.lat) * (height / 180);
                
                if (!s.online) {
                    ctx.fillStyle = '#555';
                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#888';
                    ctx.font = '12px monospace';
                    ctx.fillText('⏳ Soon', x+10, y-5);
                    return;
                }
                
                // Пульсирующее свечение
                const pulse = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#39ff14';
                ctx.fillStyle = '#39ff14';
                ctx.beginPath();
                ctx.arc(x, y, 8 + pulse * 2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#39ff14';
                ctx.font = 'bold 11px monospace';
                ctx.fillText(s.name, x+12, y-5);
                if (s.ping) {
                    ctx.fillStyle = '#8f8';
                    ctx.font = '9px monospace';
                    ctx.fillText(`⬆ ${s.ping}ms | ${s.load}%`, x+12, y+5);
                }
                if (s.virtual) {
                    ctx.fillStyle = '#ffaa44';
                    ctx.font = '9px monospace';
                    ctx.fillText('🔗 virtual peer', x+12, y+15);
                }
            });
            
            // Легенда
            ctx.fillStyle = '#39ff14';
            ctx.font = '10px monospace';
            ctx.fillText('● Активный сервер', 15, 30);
            ctx.fillStyle = '#ffaa44';
