<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DearkVPN — приватный VPN с обходом блокировок</title>
    <meta name="description" content="DearkVPN — VLESS, REALITY, Amnezia. Оплата Telegram Stars. 50⭐ — 30 дней, 90⭐ — 60 дней. Безлимит, обход белых списков.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Кислотно-зеленый акцент */
        :root {
            --accent: #39ff14;
            --accent-glow: rgba(57, 255, 20, 0.2);
            --accent-dark: #2ecc10;
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --border: #222;
        }

        /* Бургер-кнопка */
        .burger {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 200;
            cursor: pointer;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            transition: 0.2s;
        }

        .burger:hover {
            border-color: var(--accent);
        }

        .burger span {
            display: block;
            width: 24px;
            height: 2px;
            background: #fff;
            margin: 5px 0;
            transition: 0.3s;
            border-radius: 2px;
        }

        /* Боковое меню */
        .menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: #0d0d0d;
            border-right: 1px solid var(--border);
            z-index: 150;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 80px 24px 24px;
            backdrop-filter: blur(10px);
        }

        .menu.open {
            left: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 140;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .menu-item {
            display: block;
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 18px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.2s;
            font-family: inherit;
        }

        .menu-item:hover {
            background: rgba(57, 255, 20, 0.1);
            color: var(--accent);
        }

        .menu-item.active {
            background: rgba(57, 255, 20, 0.15);
            color: var(--accent);
            border-left: 3px solid var(--accent);
        }

        /* Основной контент */
        .content {
            min-height: 100vh;
            transition: opacity 0.2s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px 60px;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 40px 0;
        }

        .hero h1 {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            color: #aaa;
            max-width: 650px;
            margin: 0 auto;
        }

        .badge {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.3);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 24px;
            color: var(--accent);
        }

        /* Карточки */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            margin: 50px 0;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 24px;
            transition: 0.2s;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .card-icon {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .card h3 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .card p {
            color: #aaa;
        }

        /* Тарифы */
        .tariff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            margin: 40px 0;
        }

        .tariff-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            transition: 0.2s;
        }

        .tariff-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .tariff-stars {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 16px 0;
        }

        .tariff-days {
            font-size: 18px;
            color: #ccc;
            margin: 16px 0;
        }

        .feature-list {
            margin: 30px 0;
            text-align: left;
            display: inline-block;
        }

        .feature-list li {
            margin: 10px 0;
            color: #bbb;
            list-style: none;
            padding-left: 24px;
            position: relative;
        }

        .feature-list li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        /* Кнопки */
        .btn-primary {
            background: var(--accent);
            color: #000;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-primary:hover {
            background: var(--accent-dark);
            transform: scale(0.98);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 28px;
        }

        /* Инструкция — табы */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .tab-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: #ccc;
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .tab-content {
            display: none;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid var(--border);
        }

        .tab-content.active {
            display: block;
        }

        .code-block {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #333;
        }

        .copy-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            opacity: 0;
            transition: 0.2s;
            z-index: 300;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .section-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        .section-sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }

        .support-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        @media (max-width: 700px) {
            .hero h1 {
                font-size: 36px;
            }
            .container {
                padding: 70px 20px 40px;
            }
            .menu {
                width: 260px;
            }
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 32px 0;
            text-align: center;
            margin-top: 60px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="burger" id="burgerBtn">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="menu-overlay" id="menuOverlay"></div>

<div class="menu" id="menu">
    <button class="menu-item active" data-page="home">🏠 Главная</button>
    <button class="menu-item" data-page="tariffs">⭐ Тарифы</button>
    <button class="menu-item" data-page="guide">📖 Инструкция</button>
    <button class="menu-item" data-page="support">💬 Поддержка</button>
</div>

<div class="content" id="content">
    <div class="container" id="pageContainer"></div>
</div>

<div class="toast" id="toast">✅ Скопировано!</div>

<script>
    // Страницы
    const pages = {
        home: `
            <section class="hero">
                <div class="badge">⚡ Обход белых списков • Без логов • Telegram Stars</div>
                <h1>DearkVPN — свобода <br> без компромиссов</h1>
                <p>Современные протоколы VLESS, REALITY, Amnezia. Работает там, где другие VPN блокируют.</p>
                <div class="btn-group">
                    <a href="https://t.me/dearkvpn_bot" target="_blank" class="btn-primary">🤖 Перейти в бота</a>
                    <button class="btn-secondary" id="toTariffsBtn">📦 Выбрать тариф</button>
                </div>
            </section>

            <div class="grid-3">
                <div class="card">
                    <div class="card-icon">🔒</div>
                    <h3>VLESS + REALITY</h3>
                    <p>Маскировка под обычный HTTPS. Невозможно обнаружить и заблокировать.</p>
                </div>
                <div class="card">
                    <div class="card-icon">🌀</div>
                    <h3>Amnezia</h3>
                    <p>Обфускация, скрывающая VPN от DPI. Идеально для стран с белыми списками.</p>
                </div>
                <div class="card">
                    <div class="card-icon">🚀</div>
                    <h3>Высокая скорость</h3>
                    <p>Прямые маршруты, оптимизированные серверы. 4K, игры, звонки.</p>
                </div>
            </div>

            <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 20px 0;">
                <span style="background: #111; padding: 8px 20px; border-radius: 40px;">✅ Безлимитный трафик</span>
                <span style="background: #111; padding: 8px 20px; border-radius: 40px;">🚫 Нет логов</span>
                <span style="background: #111; padding: 8px 20px; border-radius: 40px;">📱 Все устройства</span>
                <span style="background: #111; padding: 8px 20px; border-radius: 40px;">⚡ Обход DPI</span>
            </div>
        `,

        tariffs: `
            <h2 class="section-title">Оплата Telegram Stars</h2>
            <p class="section-sub">Пополнение через Telegram — быстро, безопасно, без комиссии</p>
            
            <div class="tariff-grid">
                <div class="tariff-card">
                    <div class="tariff-stars">⭐ 50 Stars</div>
                    <div class="tariff-days">📆 30 дней подписки</div>
                    <ul class="feature-list">
                        <li>Безлимитный трафик</li>
                        <li>VLESS/REALITY/Amnezia</li>
                        <li>Обход белых списков</li>
                        <li>Поддержка 24/7</li>
                    </ul>
                    <a href="https://t.me/dearkvpn_bot" target="_blank" class="btn-primary">Оплатить 50⭐</a>
                </div>

                <div class="tariff-card">
                    <div class="tariff-stars">⭐ 90 Stars</div>
                    <div class="tariff-days">📆 60 дней подписки</div>
                    <ul class="feature-list">
                        <li>Безлимитный трафик</li>
                        <li>VLESS/REALITY/Amnezia</li>
                        <li>Обход белых списков</li>
                        <li>Экономия 10⭐</li>
                    </ul>
                    <a href="https://t.me/dearkvpn_bot" target="_blank" class="btn-primary">Оплатить 90⭐</a>
                </div>
            </div>
        `,

        guide: `
            <h2 class="section-title">Инструкция по подключению</h2>
            <div class="tabs" id="tabsContainer">
                <button class="tab-btn active" data-os="android">📱 Android</button>
                <button class="tab-btn" data-os="ios">🍏 iOS</button>
                <button class="tab-btn" data-os="windows">💻 Windows</button>
                <button class="tab-btn" data-os="mac">🍎 macOS</button>
                <button class="tab-btn" data-os="linux">🐧 Linux</button>
            </div>
            <div id="tabContent"></div>
        `,

        support: `
            <h2 class="section-title">Поддержка и контакты</h2>
            <p class="section-sub">Мы всегда на связи в Telegram</p>
            <div class="support-buttons">
                <a href="https://t.me/dearkvpn_bot" target="_blank" class="btn-primary">🤖 Бот для оплаты</a>
                <a href="https://t.me/dearkvpn" target="_blank" class="btn-secondary">📢 Новостной канал</a>
                <a href="https://t.me/dearkvpn" target="_blank" class="btn-secondary">💬 Чат поддержки</a>
            </div>
            <div style="background: #111; border-radius: 24px; padding: 32px; margin-top: 48px; text-align: center; border: 1px solid #222;">
                <h3 style="margin-bottom: 16px;">Не нашли ответ?</h3>
                <p style="color: #aaa; margin-bottom: 24px;">Напишите нам в Telegram — ответим в течение часа</p>
                <a href="https://t.me/dearkvpn" target="_blank" class="btn-primary">Написать в поддержку</a>
            </div>
        `
    };

    // Данные для инструкций
    const guideData = {
        android: {
            app: "NekoRay / v2rayNG / Hiddify",
            steps: [
                "Скачайте приложение из Google Play или с официального сайта",
                "Откройте бота @dearkvpn_bot и оплатите подписку",
                "Бот пришлёт конфиг — скачайте файл",
                "В приложении нажмите «Импорт» и выберите полученный файл",
                "Включите VPN"
            ],
            command: "конфиг-файл.conf"
        },
        ios: {
            app: "Shadowrocket / Streisand / V2Box",
            steps: [
                "Установите приложение из App Store",
                "Перейдите в бот @dearkvpn_bot, оплатите подписку",
                "Бот пришлёт ссылку — нажмите на неё",
                "Приложение откроется автоматически, сохраните конфиг",
                "Подключитесь"
            ],
            command: "ссылка-на-конфиг"
        },
        windows: {
            app: "v2rayN / Nekoray / Hiddify",
            steps: [
                "Скачайте v2rayN с GitHub",
                "Распакуйте и запустите",
                "Получите конфиг у бота @dearkvpn_bot",
                "Перетащите файл в окно v2rayN",
                "Нажмите Enter → Подключиться"
            ],
            command: "v2rayN.exe"
        },
        mac: {
            app: "V2RayX / Nekoray / Hiddify",
            steps: [
                "Установите Nekoray для macOS",
                "Откройте бота, оплатите, получите конфиг",
                "В Nekoray: Profile → Import → Выберите файл",
                "Нажмите Connect"
            ],
            command: "nekoray.dmg"
        },
        linux: {
            app: "Nekoray / v2rayA / Qv2ray",
            steps: [
                "Установите Nekoray (apt / pacman / сборка)",
                "Запустите, получите конфиг у бота",
                "Импортируйте файл (Перетащите в окно)",
                "Включите туннель"
            ],
            command: "nekoray.AppImage"
        }
    };

    let currentPage = "home";

    function renderGuide(os) {
        const data = guideData[os];
        const content = `
            <div style="margin-bottom: 24px;">
                <h3 style="color: var(--accent); margin-bottom: 8px;">📱 Приложение: ${data.app}</h3>
            </div>
            <div style="background: #1a1a1a; border-radius: 20px; padding: 20px;">
                <h4 style="margin-bottom: 16px;">Пошаговая инструкция:</h4>
                <ol style="margin-left: 20px; color: #ccc; line-height: 1.8;">
                    ${data.steps.map(step => `<li>${step}</li>`).join('')}
                </ol>
                ${data.os === 'android' || os === 'ios' ? `
                    <div class="code-block">
                        <span style="font-family: monospace; word-break: break-all;">📁 ${data.command}</span>
                        <button class="copy-btn" data-copy="${data.command}">Копировать</button>
                    </div>
                ` : `
                    <div class="code-block">
                        <span style="font-family: monospace;">💻 ${data.command}</span>
                        <button class="copy-btn" data-copy="${data.command}">Копировать название</button>
                    </div>
                `}
                <p style="color: #aaa; margin-top: 16px; font-size: 14px;">💡 Не получается? Напишите в поддержку — поможем!</p>
            </div>
        `;
        document.getElementById("tabContent").innerHTML = content;
        attachCopyEvents();
    }

    function attachCopyEvents() {
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const text = btn.getAttribute('data-copy');
                navigator.clipboard.writeText(text);
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1500);
            });
        });
    }

    function loadPage(page) {
        currentPage = page;
        const container = document.getElementById('pageContainer');
        container.innerHTML = pages[page];
        
        if (page === 'guide') {
            renderGuide('android');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGuide(btn.getAttribute('data-os'));
                });
            });
        }
        
        if (page === 'home') {
            const btn = document.getElementById('toTariffsBtn');
            if (btn) btn.addEventListener('click', () => changePage('tariffs'));
        }
        
        document.querySelectorAll('.menu-item').forEach(item => {
            if (item.getAttribute('data-page') === page) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changePage(page) {
        closeMenu();
        loadPage(page);
        history.pushState(null, '', `#${page}`);
    }

    function closeMenu() {
        document.getElementById('menu').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('open');
    }

    function openMenu() {
        document.getElementById('menu').classList.add('open');
        document.getElementById('menuOverlay').classList.add('open');
    }

    document.getElementById('burgerBtn').addEventListener('click', openMenu);
    document.getElementById('menuOverlay').addEventListener('click', closeMenu);
    
    document.querySelectorAll('.menu-item').forEach(btn => {
        btn.addEventListener('click', () => changePage(btn.getAttribute('data-page')));
    });

    const hash = window.location.hash.slice(1);
    if (hash && pages[hash]) {
        loadPage(hash);
    } else {
        loadPage('home');
    }

    window.addEventListener('popstate', () => {
        const h = window.location.hash.slice(1);
        if (h && pages[h]) loadPage(h);
        else loadPage('home');
    });
</script>
</body>
  </html>
